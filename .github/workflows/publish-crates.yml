name: Publish crates.io packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish
        required: true
        default: '1.1.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish package family
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Require crates.io credentials
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: |
          echo "CARGO_REGISTRY_TOKEN is not configured" >&2
          exit 1
      - name: Publish package family in dependency order
        shell: bash
        run: |
          set -euo pipefail
          packages=(
            pleiades-agent-core
            pleiades-agent-config
            pleiades-agent-sdk
            pleiades-agent-prompts
            pleiades-agent-memory
            pleiades-agent-providers
            pleiades-agent-tools
            pleiades-agent-plugins
            pleiades-agent-workflow
            pleiades-agent-git
            pleiades-agent-engine
            pleiades-agent-tui
            pleiades-agent
          )
          version="${{ inputs.version }}"
          for package in "${packages[@]}"; do
            if cargo info --registry crates-io "$package@$version" >/dev/null 2>&1; then
              echo "$package@$version is already published; skipping"
              continue
            fi
            published=false
            for attempt in $(seq 1 30); do
              if cargo publish --locked -p "$package"; then
                published=true
                break
              fi
              echo "Publish attempt $attempt for $package failed; waiting for registry propagation or rate-limit reset"
              sleep 60
            done
            if [ "$published" != true ]; then
              echo "Failed to publish $package after 30 attempts" >&2
              exit 1
            fi
          done
