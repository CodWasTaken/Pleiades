name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: pleiades-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: pleiades-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: pleiades-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: pleiades-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: pleiades-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux cross compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact_name }}.tar.gz pleiades${{ matrix.os == 'windows-latest' && '.exe' || '' }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}.tar.gz

  publish-cargo:
    name: Publish crates.io packages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Publish package family in dependency order
        if: env.CARGO_REGISTRY_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          packages=(
            pleiades-agent-core
            pleiades-agent-config
            pleiades-agent-sdk
            pleiades-agent-prompts
            pleiades-agent-memory
            pleiades-agent-providers
            pleiades-agent-tools
            pleiades-agent-plugins
            pleiades-agent-workflow
            pleiades-agent-git
            pleiades-agent-engine
            pleiades-agent-tui
            pleiades-agent
          )
          version="${GITHUB_REF_NAME#v}"
          for package in "${packages[@]}"; do
            package_version=$(cargo metadata --no-deps --format-version 1 | jq -r --arg package "$package" '.packages[] | select(.name == $package) | .version')
            if [ "$package_version" != "$version" ]; then
              echo "$package is version $package_version, not $version; skipping"
              continue
            fi
            if cargo info --registry crates-io "$package@$version" >/dev/null 2>&1; then
              echo "$package@$version is already published; skipping"
              continue
            fi
            published=false
            for attempt in $(seq 1 30); do
              if cargo publish --locked -p "$package"; then
                published=true
                break
              fi
              echo "Publish attempt $attempt for $package failed; waiting for registry propagation or rate-limit reset"
              sleep 60
            done
            if [ "$published" != true ]; then
              echo "Failed to publish $package after 30 attempts" >&2
              exit 1
            fi
          done
      - name: Explain skipped publication
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: |
          echo "CARGO_REGISTRY_TOKEN is not configured."
          echo "Add it under Settings > Secrets and variables > Actions before publishing this release."

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Generate checksums
        run: |
          cd artifacts
          for f in */pleiades-*.tar.gz; do
            sha256sum "$f" >> checksums.txt
          done
      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -d '' assets < <(find artifacts -type f -print0)
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes-file CHANGELOG.md \
            --generate-notes
