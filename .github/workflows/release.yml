name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: pleiades-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: pleiades-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: pleiades-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: pleiades-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: pleiades-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux cross compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact_name }}.tar.gz pleiades${{ matrix.os == 'windows-latest' && '.exe' || '' }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}.tar.gz

  publish-cargo:
    name: Publish crates.io packages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Publish package family in dependency order
        if: env.CARGO_REGISTRY_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          packages=(
            pleiades-agent-core
            pleiades-agent-config
            pleiades-agent-sdk
            pleiades-agent-prompts
            pleiades-agent-memory
            pleiades-agent-providers
            pleiades-agent-tools
            pleiades-agent-plugins
            pleiades-agent-workflow
            pleiades-agent-git
            pleiades-agent-engine
            pleiades-agent-tui
            pleiades-agent
          )
          version="${GITHUB_REF_NAME#v}"
          for package in "${packages[@]}"; do
            if cargo info --registry crates-io "$package@$version" >/dev/null 2>&1; then
              echo "$package@$version is already published; skipping"
              continue
            fi
            published=false
            for attempt in 1 2 3 4 5; do
              if cargo publish --locked -p "$package"; then
                published=true
                break
              fi
              echo "Publish attempt $attempt for $package failed; waiting for registry propagation"
              sleep 20
            done
            if [ "$published" != true ]; then
              echo "Failed to publish $package after 5 attempts" >&2
              exit 1
            fi
          done
      - name: Explain skipped publication
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: |
          echo "CARGO_REGISTRY_TOKEN is not configured."
          echo "Add it under Settings > Secrets and variables > Actions before publishing v1.1.0."

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate checksums
        run: |
          cd artifacts
          for f in */pleiades-*.tar.gz; do
            sha256sum "$f" >> checksums.txt
          done
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: CHANGELOG.md
          generate_release_notes: true
