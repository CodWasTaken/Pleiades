[package]
name = "pleiades-tui"
version = "0.1.0"
edition = "2024"
description = "Pleiades terminal user interface"
authors = ["Nataniel"]
license = "MIT"
repository = "https://github.com/yourusername/pleiades"

[dependencies]
pleiades-core = { path = "../pleiades-core" }
pleiades-config = { path = "../pleiades-config" }
pleiades-engine = { path = "../pleiades-engine" }
pleiades-providers = { path = "../pleiades-providers" }
pleiades-tools = { path = "../pleiades-tools" }

pulldown-cmark = { version = "0.12", default-features = false, features = ["html"] }
syntect = { version = "5", default-features = false, features = ["default-fancy"] }
ratatui = "0.28"
crossterm = "0.28"
tokio = { version = "1", features = ["sync", "rt", "macros"] }
tracing = "0.1"
unicode-width = "0.1"
once_cell = "1"
serde_json = "1"
rustyline = "14"
chrono = "0.4"
