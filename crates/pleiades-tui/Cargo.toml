[package]
name = "pleiades-tui"
version = "1.0.1"
edition = "2024"
description = "Pleiades terminal user interface"
authors = ["Nataniel"]
license = "MIT"
repository = "https://github.com/CodWasTaken/Pleiades"

[dependencies]
pleiades-core = { path = "../pleiades-core", version = "1.0.1" }
pleiades-config = { path = "../pleiades-config", version = "1.0.1" }
pleiades-engine = { path = "../pleiades-engine", version = "1.0.1" }
pleiades-providers = { path = "../pleiades-providers", version = "1.0.1" }
pleiades-tools = { path = "../pleiades-tools", version = "1.0.1" }

pulldown-cmark = { version = "0.12", default-features = false, features = ["html"] }
syntect = { version = "5", default-features = false, features = ["default-fancy"] }
ratatui = "0.28"
crossterm = "0.28"
tokio = { version = "1", features = ["sync", "rt", "macros"] }
tracing = "0.1"
unicode-width = "0.1"
once_cell = "1"
serde_json = "1"
rustyline = "14"
chrono = "0.4"
