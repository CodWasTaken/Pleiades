[package]
name = "pleiades-tui"
version = "0.1.0"
edition = "2024"
description = "Pleiades terminal user interface"
authors = ["Nataniel"]
license = "MIT"
repository = "https://github.com/yourusername/pleiades"

[dependencies]
pleiades-core = { path = "../pleiades-core" }
pleiades-config = { path = "../pleiades-config" }

ratatui = "0.28"
crossterm = "0.28"
tokio = { version = "1", features = ["sync"] }
tracing = "0.1"
unicode-width = "0.1"
once_cell = "1"
